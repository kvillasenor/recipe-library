<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Recipe</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="add-recipe-page">

    <div class="banner-container">
        <img src="/images/banner.jpg" alt="Banner">
    </div>

    <!-- Main Layout -->
    <form id="addForm" enctype="multipart/form-data">

        <div class="top-section">
            <input type="text" name="title" placeholder="Recipe Title" class="title-input" required>
            
            <div class="button-group">
                <button type="submit" class="save-btn">Save Recipe</button>
                <a href="/dashboard" class="cancel-btn">Cancel</a>
            </div>
        </div>

        <div class="main-layout">

            <!-- LEFT SIDE -->
            <div class="left-panel">
                <label>Course Type:</label>
                <select name="course" required>
                    <option value="">SELECT</option>
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Dessert">Dessert</option>
                </select>

                <label>Category:</label>
                <select name="category">
                    <option>SELECT</option>
                </select>

                <button type="button" class="small-btn" onclick="createCategory()">
                    Create New Category
                </button>

                <label>Preparation Time:</label>
                <div class="time-group">
                    <input type="number" name="prep_hours" placeholder="Hrs">
                    <input type="number" name="prep_minutes" placeholder="Mins">
                </div>

                <label>Cooking Time:</label>
                <div class="time-group">
                    <input type="number" name="cook_hours" placeholder="Hrs">
                    <input type="number" name="cook_minutes" placeholder="Mins">
                </div>
            </div>

            <!-- CENTER -->
            <div class="center-panel">
                <label>Ingredients</label>
                <textarea name="ingredients" required></textarea>

                <label>Instructions</label>
                <textarea name="instructions" required></textarea>
            </div>

            <!-- RIGHT -->
            <div class="right-panel">
                <label>Upload Image (JPG or PNG):</label>
                <p id="imageError" style="color:red; margin: 5px 0;"></p>
                <input type="file" name="image">
            </div>

        </div>

    </form>
<script>

    window.onload = function () {
        loadCategories();
    };

    function loadCategories() {
        fetch("/categories")
            .then(res => res.json())
            .then(data => {
                const dropdown = document.querySelector("select[name='category']");

                // Reset dropdown
                dropdown.innerHTML = '<option>SELECT</option>';

                data.forEach(cat => {
                    const option = document.createElement("option");
                    option.value = cat.name;
                    option.textContent = cat.name;
                    dropdown.appendChild(option);
                });
            });
    }

    function createCategory() {
        const name = prompt("Enter new category name:");

        if (!name || name.trim() === "") return;

        fetch("/categories", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name })
        })
        .then(res => res.json())
        .then(() => {
            loadCategories(); // refresh dropdown
        })
        .catch(err => console.error(err));
    }

    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");

    if (error) {
        document.getElementById("imageError").textContent = error;
    }

    document.getElementById("addForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        document.getElementById("imageError").textContent = ""; // clear old error

        const formData = new FormData(this);

        const res = await fetch("/add-recipe", {
            method: "POST",
            body: formData
        });

        if (res.ok) {
            window.location.href = "/dashboard";
        } else {
            const errorText = await res.text();
            document.getElementById("imageError").textContent = errorText;
        }
    });
</script>
</body>
</html>
