<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Recipe</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="add-recipe-page">

<div class="banner-container">
    <img src="/images/banner.jpg" alt="Banner">
</div>

<!-- Main Layout -->
<form id="editForm">

    <div class="top-section">
        <input type="text" id="title" class="title-input" required>

        <div class="button-group">
            <button type="submit" class="save-btn">Save Changes</button>
            <a href="/dashboard" class="cancel-btn">Cancel</a>
        </div>
    </div>

    <div class="main-layout">

        <!-- LEFT SIDE -->
        <div class="left-panel">
            <label>Course Type:</label>
            <select id="course" required>
                <option value="">SELECT</option>
                <option value="Breakfast">Breakfast</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner">Dinner</option>
                <option value="Dessert">Dessert</option>
            </select>

            <label>Category:</label>
            <select id="category">
                <option>SELECT</option>
            </select>

            <button type="button" class="small-btn" onclick="createCategory()">
                Create New Category
            </button>

            <label>Preparation Time:</label>
            <div class="time-group">
                <input type="number" id="prep_hours" placeholder="Hrs">
                <input type="number" id="prep_minutes" placeholder="Mins">
            </div>

            <label>Cooking Time:</label>
            <div class="time-group">
                <input type="number" id="cook_hours" placeholder="Hrs">
                <input type="number" id="cook_minutes" placeholder="Mins">
            </div>
        </div>

        <!-- CENTER -->
        <div class="center-panel">
            <label>Ingredients</label>
            <textarea id="ingredients" required></textarea>

            <label>Instructions</label>
            <textarea id="instructions" required></textarea>
        </div>

        <!-- RIGHT -->
        <div class="right-panel">
            <label>Image cannot be changed yet</label>
        </div>

    </div>

</form>

<script>
let recipeId = null;

async function loadRecipe() {
    recipeId = window.location.pathname.split("/").pop();

    const res = await fetch(`/recipes/${recipeId}`, {
        credentials: "include"
    });

    if (!res.ok) {
        document.body.innerHTML = "<h2>Recipe not found</h2>";
        return;
    }

    const recipe = await res.json();

    document.getElementById("title").value = recipe.title;
    document.getElementById("ingredients").value = recipe.ingredients;
    document.getElementById("instructions").value = recipe.instructions;
    document.getElementById("course").value = recipe.course;
    document.getElementById("category").value = recipe.category;

    const prep = recipe.prep_time.match(/\d+/g);
    const cook = recipe.cook_time.match(/\d+/g);

    document.getElementById("prep_hours").value = prep ? prep[0] : "";
    document.getElementById("prep_minutes").value = prep ? prep[1] : "";
    document.getElementById("cook_hours").value = cook ? cook[0] : "";
    document.getElementById("cook_minutes").value = cook ? cook[1] : "";
}

loadRecipe();
</script>

</body>
</html>
