<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Recipe</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="add-recipe-page">

<div class="banner-container">
    <img src="/images/banner.jpg" alt="Banner">
</div>

<!-- Main Layout -->
<form id="editForm" enctype="multipart/form-data">

    <div class="top-section">
        <input type="text" id="title" class="title-input" required>

        <div class="button-group">
            <button type="submit" class="save-btn">Save Changes</button>
            <a href="/dashboard" class="cancel-btn">Cancel</a>
        </div>
    </div>

    <div class="main-layout">

        <!-- LEFT SIDE -->
        <div class="left-panel">
            <label>Course Type:</label>
            <select id="course" required>
                <option value="">SELECT</option>
                <option value="Breakfast">Breakfast</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner">Dinner</option>
                <option value="Dessert">Dessert</option>
            </select>

            <label>Category:</label>
            <select id="category">
                <option value="">SELECT</option>
            </select>

            <button type="button" class="small-btn" onclick="createCategory()">
                Create New Category
            </button>

            <label>Preparation Time:</label>
            <div class="time-group">
                <input type="number" id="prep_hours" placeholder="Hrs">
                <input type="number" id="prep_minutes" placeholder="Mins">
            </div>

            <label>Cooking Time:</label>
            <div class="time-group">
                <input type="number" id="cook_hours" placeholder="Hrs">
                <input type="number" id="cook_minutes" placeholder="Mins">
            </div>
        </div>

        <!-- CENTER -->
        <div class="center-panel">
            <label>Ingredients</label>
            <textarea id="ingredients" required></textarea>

            <label>Instructions</label>
            <textarea id="instructions" required></textarea>
        </div>

        <!-- RIGHT -->
        <div class="right-panel">
            <label>Upload New Image (optional):</label>
            <input type="file" id="image" accept="image/png, image/jpeg">
        </div>

    </div>

</form>

<script>
let recipeId = null;

async function loadCategories(selectedCategory) {
    const res = await fetch("/categories");
    const data = await res.json();

    const dropdown = document.getElementById("category");
    dropdown.innerHTML = '<option value="">SELECT</option>';

    data.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat.name;
        option.textContent = cat.name;

        if (cat.name === selectedCategory) {
            option.selected = true;
        }

        dropdown.appendChild(option);
    });
}

async function loadRecipe() {
    recipeId = window.location.pathname.split("/").pop();

    const res = await fetch(`/recipes/${recipeId}`, {
        credentials: "include"
    });

    if (!res.ok) {
        document.body.innerHTML = "<h2>Recipe not found</h2>";
        return;
    }

    const recipe = await res.json();

    document.getElementById("title").value = recipe.title;
    document.getElementById("ingredients").value = recipe.ingredients;
    document.getElementById("instructions").value = recipe.instructions;
    document.getElementById("course").value = recipe.course;
    loadCategories(recipe.category);

    const prep = recipe.prep_time ? recipe.prep_time.match(/\d+/g) : null;
    const cook = recipe.cook_time ? recipe.cook_time.match(/\d+/g) : null;

    document.getElementById("prep_hours").value = prep ? prep[0] : "";
    document.getElementById("prep_minutes").value = prep ? prep[1] : "";
    document.getElementById("cook_hours").value = cook ? cook[0] : "";
    document.getElementById("cook_minutes").value = cook ? cook[1] : "";
}

function createCategory() {
    const name = prompt("Enter new category name:");

    if (!name || name.trim() === "") return;

    fetch("/categories", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name })
    })
    .then(() => loadCategories(name))
    .catch(err => console.error(err));
}


document.getElementById("editForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const id = window.location.pathname.split("/").pop();

    const formData = new FormData();

    formData.append("title", document.getElementById("title").value);
    formData.append("ingredients", document.getElementById("ingredients").value);
    formData.append("instructions", document.getElementById("instructions").value);
    formData.append("prep_hours", document.getElementById("prep_hours").value);
    formData.append("prep_minutes", document.getElementById("prep_minutes").value);
    formData.append("cook_hours", document.getElementById("cook_hours").value);
    formData.append("cook_minutes", document.getElementById("cook_minutes").value);
    formData.append("course", document.getElementById("course").value);
    formData.append("category", document.getElementById("category").value);

    const imageFile = document.getElementById("image").files[0];
    if (imageFile) {
        formData.append("image", imageFile);
    }

    const res = await fetch(`/update-recipe/${id}`, {
        method: "POST",
        body: formData
    });

    if (res.ok) {
        window.location.href = "/dashboard";
    } else {
        alert("Error updating recipe");
    }
});

loadRecipe();



</script>

</body>
</html>
