<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
</head>

<body class="dashboard-page">

    <div class="banner-container">
        <img src="/images/banner.jpg" alt="Site Banner" class="banner">
    </div>

    <!-- MAIN WRAPPER -->
    <div class="dashboard-wrapper">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <input type="text" placeholder="Search Recipe" class="search-bar">

            <a href="/add-recipe" class="sidebar-btn">➕ Add New Recipe</a>

            <a href="/" class="signout-btn">Sign Out</a>

            <img src="/images/breadS.png" class="sidebar-image">

        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">

            <!-- TABS -->
            <div class="tabs">
                <button class="tab active">VIEW ALL</button>
                <button class="tab">COURSES</button>
            </div>

            <!-- CONTENT AREA -->
            <div class="content-box">

                <h2 id="emptyMessage" class="empty-text">“No Saved Recipes Yet”</h2>

                <div id="recipeGrid"></div>

            </div>

        </div>

    </div>

    <script>
        window.onload = function () {
            fetch("/recipes")
            .then(res => res.json())
            .then(data => {
                console.log("Recipes:", data);
                displayRecipes(data);
            })
            .catch(err => console.error(err));
        };

        function displayRecipes(recipes) {
            const container = document.getElementById("recipeGrid");
            const emptyMessage = document.getElementById("emptyMessage");

            container.innerHTML = "";

            if (!Array.isArray(recipes) || recipes.length === 0) {
                emptyMessage.style.display = "block";
                return;
            }

            emptyMessage.style.display = "none";

            recipes.forEach(recipe => {
                const card = document.createElement("div");
                card.classList.add("recipe-card");

                card.innerHTML = `
                    <img src="${recipe.image || '/images/default.png'}" class="recipe-img">
                    <div class="recipe-title">${recipe.title}</div>
                `;

                container.appendChild(card);
            });
        }

    </script>

</body>
