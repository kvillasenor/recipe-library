<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
</head>

<body class="dashboard-page">

    <div class="banner-container">
        <img src="/images/banner.jpg" alt="Site Banner" class="banner">
    </div>

    <!-- MAIN WRAPPER -->
    <div class="dashboard-wrapper">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <input type="text" id="searchInput" placeholder="Search Recipe" class="search-bar">

            <a href="/add-recipe" class="sidebar-btn">➕ Add New Recipe</a>

            <a href="/" class="signout-btn">Sign Out</a>

            <img src="/images/breadS.png" class="sidebar-image">

        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">

            <!-- TABS -->
            <div class="tabs">
                <button class="tab active" onclick="showAll()">VIEW ALL</button>
                <button class="tab" onclick="showCourses()">COURSES</button>
            </div>

            <!-- CONTENT AREA -->
            <div class="content-box">

                <h2 id="emptyMessage" class="empty-text">“No Saved Recipes Yet”</h2>

                <div id="recipeGrid"></div>

            </div>

        </div>

    </div>

    <script>

        function getImage(recipe) {
            if (!recipe.image) return '/images/default.png';
            return recipe.image;
        }
        
        let allRecipes = [];

        const searchInput = document.getElementById("searchInput");

        searchInput.addEventListener("input", function () {
            const query = this.value.toLowerCase().trim();

            showAll();

            // If search is empty → show all recipes again
            if (query === "") {
                displayAllRecipes(allRecipes);
                return;
            }

            // Filter recipes
            const filtered = allRecipes.filter(recipe => {
                return (
                    recipe.title?.toLowerCase().includes(query) ||
                    recipe.ingredients?.toLowerCase().includes(query) ||
                    recipe.course?.toLowerCase().includes(query) ||
                    recipe.category?.toLowerCase().includes(query)
                );
            });

            displayAllRecipes(filtered);
        });

        const courseData = [
            { name: "Breakfast", image: "/images/breakfastFolder.png" },
            { name: "Lunch", image: "/images/lunchFolder.png" },
            { name: "Dinner", image: "/images/dinnerFolder.png" },
            { name: "Dessert", image: "/images/dessertFolder.png" }
        ];
        window.onload = function () {
            fetch("/recipes")
                .then(res => res.json())
                .then(data => {
                    allRecipes = data;
                    displayAllRecipes(allRecipes); // default tab
                })
                .catch(err => console.error(err));
        };

        function displayAllRecipes(recipes) {
            const container = document.getElementById("recipeGrid");
            const emptyMessage = document.getElementById("emptyMessage");

            container.innerHTML = "";

            if (!recipes || recipes.length === 0) {
                emptyMessage.style.display = "block";
                return;
            }

            emptyMessage.style.display = "none";

            recipes.forEach(recipe => {
                const card = document.createElement("div");
                card.classList.add("recipe-card");

                card.innerHTML = `
                    <img src="${getImage(recipe)}" class="recipe-img">
                    <div class="recipe-title">${recipe.title}</div>
                `;

                card.onclick = function () {
                    window.location.href = `/recipe/${recipe.id}`;
                };

                container.appendChild(card);
            });
        }

        function groupByCourse(recipes) {
            return recipes.reduce((groups, recipe) => {
                const course = recipe.course || "Uncategorized";

                if (!groups[course]) {
                    groups[course] = [];
                }

                groups[course].push(recipe);

                return groups;
            }, {});
        }

        function groupByCategory(recipes) {
            return recipes.reduce((groups, recipe) => {
                const category = recipe.category || "Uncategorized";

                if (!groups[category]) {
                    groups[category] = [];
                }

                groups[category].push(recipe);

                return groups;
            }, {});
        }

        function displayCourses(recipes) {
            const container = document.getElementById("recipeGrid");
            const emptyMessage = document.getElementById("emptyMessage");

            container.innerHTML = "";

            if (!recipes || recipes.length === 0) {
                emptyMessage.style.display = "block";
                return;
            }

            emptyMessage.style.display = "none";

            const grouped = groupByCourse(recipes);

            // Force order you want
            const order = ["Breakfast", "Lunch", "Dinner", "Dessert"];

            order.forEach(course => {
                if (!grouped[course]) return;

                const title = document.createElement("h3");
                title.classList.add("course-title");
                title.innerText = course;

                container.appendChild(title);

                const grid = document.createElement("div");
                grid.classList.add("course-grid");

                grouped[course].forEach(recipe => {
                    const card = document.createElement("div");
                    card.classList.add("recipe-card");

                    card.innerHTML = `
                        <img src="${getImage(recipe)}" class="recipe-img">
                        <div class="recipe-title">${recipe.title}</div>
                    `;

                    card.onclick = function () {
                        window.location.href = `/recipe/${recipe.id}`;
                    };

                    grid.appendChild(card);
                });

                container.appendChild(grid);
            });
        }

        function displayCourseFolders() {
            const container = document.getElementById("recipeGrid");
            const emptyMessage = document.getElementById("emptyMessage");

            container.innerHTML = "";
            emptyMessage.style.display = "none";

            courseData.forEach(course => {
                const card = document.createElement("div");
                card.classList.add("course-image-card");

                card.innerHTML = `
                    <img src="${course.image}" class="course-img">
                `;

                card.onclick = function () {
                    showCategories(course.name);
                };

                container.appendChild(card);
            });
        }


        function showCategories(courseName) {
            const container = document.getElementById("recipeGrid");
            const emptyMessage = document.getElementById("emptyMessage");

            container.innerHTML = "";

            const filtered = allRecipes.filter(r => r.course === courseName);

            if (filtered.length === 0) {
                emptyMessage.style.display = "block";
                emptyMessage.innerText = "No recipes in " + courseName;
                return;
            }

            emptyMessage.style.display = "none";

            const grouped = groupByCategory(filtered);

            Object.keys(grouped).forEach(category => {
                const card = document.createElement("div");
                card.classList.add("course-image-card");

                card.innerHTML = `
                    <img src="/images/customFolder.png" class="course-img">
                    <div class="category-label">${category}</div>
                `;

                card.onclick = function () {
                    showRecipesByCategory(courseName, category);
                };

                container.appendChild(card);
            });
        }

        function showRecipesByCategory(courseName, categoryName) {
            const container = document.getElementById("recipeGrid");
            const emptyMessage = document.getElementById("emptyMessage");

            container.innerHTML = "";

            const filtered = allRecipes.filter(r =>
                r.course === courseName && r.category === categoryName
            );

            if (filtered.length === 0) {
                emptyMessage.style.display = "block";
                return;
            }

            emptyMessage.style.display = "none";

            filtered.forEach(recipe => {
                const card = document.createElement("div");
                card.classList.add("recipe-card");

                card.innerHTML = `
                    <img src="${getImage(recipe)}" class="recipe-img">
                    <div class="recipe-title">${recipe.title}</div>
                `;

                card.onclick = function () {
                    window.location.href = `/recipe/${recipe.id}`;
                };

                container.appendChild(card);
            });
        }

        function showAll() {
            setActiveTab(0);
            displayAllRecipes(allRecipes);
        }

        function showCourses() {
            setActiveTab(1);
            displayCourseFolders();
        }

        function setActiveTab(index) {
            const tabs = document.querySelectorAll(".tab");

            tabs.forEach((tab, i) => {
                tab.classList.toggle("active", i === index);
            });
        }

    </script>

</body>
