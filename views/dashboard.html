<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
</head>

<body class="dashboard-page">

    <div class="banner-container">
        <img src="/images/banner.jpg" alt="Site Banner" class="banner">
    </div>

    <!-- MAIN WRAPPER -->
    <div class="dashboard-wrapper">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <input type="text" placeholder="Search Recipe" class="search-bar">

            <a href="/add-recipe" class="sidebar-btn">➕ Add New Recipe</a>

            <a href="/" class="signout-btn">Sign Out</a>

            <img src="/images/breadS.png" class="sidebar-image">

        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">

            <!-- TABS -->
            <div class="tabs">
                <button class="tab active">VIEW ALL</button>
                <button class="tab">COURSES</button>
            </div>

            <!-- CONTENT AREA -->
            <div class="content-box">

                <h2 class="empty-text">“No Saved Recipes Yet”</h2>

            </div>

        </div>

    </div>

</body>
